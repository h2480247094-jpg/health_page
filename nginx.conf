# Nginx 配置 — 放到 /etc/nginx/sites-available/health-tracker
server {
    listen 80;
    server_name _;  # 替换为你的域名，没有域名就保持 _

    # 上传文件大小限制
    client_max_body_size 20m;

    # 前端静态文件（直接用 Nginx 提供，更快）
    location / {
        root /home/ubuntu/health-page/frontend;
        index app.html;
        try_files $uri $uri/ /app.html;
    }

    # 登录页
    location = /login.html {
        root /home/ubuntu/health-page/frontend;
    }

    # API 反向代理到 Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # AI 请求可能较慢
    }

    # 上传的照片
    location /uploads/ {
        alias /home/ubuntu/health-page/backend/uploads/photos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS 缓存
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico)$ {
        root /home/ubuntu/health-page/frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
