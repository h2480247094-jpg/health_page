<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>登录 - 个人健康管理</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    .auth-card .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .auth-card h1 {
      font-size: 22px;
      color: #333;
      margin: 0 0 6px;
    }
    .auth-card .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }
    .auth-card .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .auth-card label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .auth-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .auth-card input:focus {
      border-color: #4caf50;
    }
    .auth-card .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .auth-card .btn-primary:active {
      opacity: 0.8;
    }
    .auth-card .switch-mode {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }
    .auth-card .switch-mode a {
      color: #4caf50;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }
    .auth-card .error-msg {
      color: #e53935;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }
    .auth-card .success-msg {
      color: #4caf50;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">🏥</div>
      <h1 id="authTitle">登录</h1>
      <p class="subtitle">个人健康管理 · 多用户版</p>

      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="authEmail" placeholder="请输入邮箱" autocomplete="email">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="authPassword" placeholder="请输入密码（至少6位）" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="authBtn" onclick="handleAuth()">登 录</button>
      <div class="error-msg" id="authError"></div>
      <div class="success-msg" id="authSuccess"></div>

      <div class="switch-mode">
        <span id="switchText">还没有账号？</span>
        <a id="switchLink" onclick="toggleMode()">注册</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
